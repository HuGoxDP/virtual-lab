# docker-compose.yml
# Запуск:      docker compose up --build -d
# Остановка:   docker compose down
# Сброс БД:    docker compose down -v
# Логи:        docker compose logs -f

services:

  # ── PostgreSQL ──────────────────────────────────────
  database:
    image: postgres:16-alpine
    container_name: VirtualLabDatabase
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - virtual_lab_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend API (Express) ───────────────────────────
  backend:
    build: ./backend
    container_name: VirtualLabBackend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: ${API_PORT}
    depends_on:
      database:
        condition: service_healthy

  # ── Nginx + Frontend ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: VirtualLabFrontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

volumes:
  virtual_lab_pgdata:
    name: virtual_lab_pgdata
